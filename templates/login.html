{% extends 'base.html' %}
{% block title %}登录 - 物业报修系统{% endblock %}
{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-6 col-lg-4">
        <div class="card shadow-lg border-0 rounded-4">
            <div class="card-body p-5">
                <div class="text-center mb-4">
                    <div class="bg-primary text-white rounded-circle d-inline-flex align-items-center justify-content-center" style="width:80px;height:80px;">
                        <i class="bi bi-tools fs-1"></i>
                    </div>
                    <h2 class="mt-3 fw-bold text-primary">物业报修系统</h2>
                    <p class="text-muted">请登录您的账户</p>
                </div>
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label fw-medium"><i class="bi bi-person me-1"></i>用户名</label>
                        <input type="text" name="username" class="form-control form-control-lg" placeholder="请输入用户名" required autofocus>
                    </div>
                    <div class="mb-4">
                        <label class="form-label fw-medium"><i class="bi bi-lock me-1"></i>密码</label>
                        <input type="password" name="password" class="form-control form-control-lg" placeholder="请输入密码" required>
                    </div>
                    <button type="submit" class="btn btn-primary btn-lg w-100 fw-medium">
                        <i class="bi bi-box-arrow-in-right me-2"></i>登录
                    </button>
                </form>
                <div class="mt-4 p-3 bg-light rounded small">
                    <p class="fw-medium mb-2 text-muted"><i class="bi bi-info-circle me-1"></i>测试账号：</p>
                    <ul class="mb-0 text-muted list-unstyled">
                        <li>住户：<code>zhangsan / 123456</code></li>
                        <li>师傅：<code>lishi / 123456</code> 或 <code>wangwu / 123456</code></li>
                        <li>调度：<code>zhaoliu / 123456</code></li>
                        <li>管理员：<code>admin / admin123</code></li>
                    </ul>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
